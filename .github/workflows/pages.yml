name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site (collect HTML files + generate index)
        run: |
          set -e
          mkdir -p _site
          shopt -s nullglob

          {
            echo '<!DOCTYPE html>'
            echo '<html lang="lt">'
            echo '<head>'
            echo '<meta charset="UTF-8">'
            echo '<meta name="viewport" content="width=device-width, initial-scale=1.0">'
            echo '<title>Skaičiuoklės</title>'
            echo '<style>'
            echo 'body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.6;color:#16323B;background:#EAF2F2}'
            echo 'h1{font-size:1.5rem;margin-bottom:1rem}'
            echo 'ul{padding-left:0;list-style:none}'
            echo 'li{margin:.5rem 0}'
            echo 'a{color:#0E8A8F;text-decoration:none;font-weight:600}'
            echo 'a:hover{text-decoration:underline}'
            echo '</style>'
            echo '</head>'
            echo '<body>'
            echo '<h1>Skaičiuoklės</h1>'
            echo '<ul>'
          } > _site/index.html

          for f in *.html; do
            [ "$f" = "index.html" ] && continue
            title=$(grep -o -m1 '<title>[^<]*</title>' "$f" | sed -e 's/<title>//' -e 's/<\/title>//')
            [ -z "$title" ] && title="$f"
            cp "$f" "_site/$f"
            echo "<li><a href=\"$f\">$title</a></li>" >> _site/index.html
          done

          {
            echo '</ul>'
            echo '</body>'
            echo '</html>'
          } >> _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
